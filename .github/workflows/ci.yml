name: CI — Test & Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Job 1: Run pipeline tests ──────────────────────────────────────────────
  test:
    name: Test pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (libsndfile + ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run demo (full pipeline test)
        env:
          MPLBACKEND: Agg
        run: python demo.py

      - name: Smoke-test Flask app starts
        env:
          MPLBACKEND: Agg
          STORAGE_DIR: /tmp/speech_melody_ci
        run: |
          python -c "
          import sys, os
          os.environ['MPLBACKEND'] = 'Agg'
          sys.path.insert(0, '.')
          from app import app
          client = app.test_client()
          resp = client.get('/')
          assert resp.status_code == 200, f'Got {resp.status_code}'
          print('✅ Flask / route OK')
          "

  # ── Job 2: Build Docker image ──────────────────────────────────────────────
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test          # Only build if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache Docker layers between runs — saves ~3-4 min on subsequent pushes
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build image (no push — just verify it compiles)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: speech-to-melody:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevent cache from growing unbounded
      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
